#!/usr/bin/env bash
# Claude Code Backup — Configuration
# All variables use ${VAR:-default} in the scripts, so env vars override at runtime.
# Example: NAS_BACKUP_ENABLED=false ~/Projects/claude_backup/_backup_tools/claude-backup.sh

# ── Source & Destination ──────────────────────────────────────────────
BACKUP_SOURCE="$HOME/.claude"
BACKUP_REPO="$HOME/Projects/claude_backup"
LOG_DIR="$HOME/Library/Logs/claude-backup"

# ── NAS Settings ──────────────────────────────────────────────────────
NAS_BACKUP_ENABLED=false                          # ← set to true if you have a NAS
NAS_SHARE="//192.168.1.100/your-share"            # ← your SMB share address
NAS_MOUNT_POINT="/tmp/claude_nas_mount"
NAS_SUBDIR="claude_code_backup"                   # ← subfolder within the share
NAS_KEYCHAIN_SERVICE="claude-backup-nas"
NAS_KEYCHAIN_ACCOUNT="nas-service-account"        # ← your NAS username

# ── Content Toggles ───────────────────────────────────────────────────
# When false, excludes: projects/, file-history/, debug/, shell-snapshots/
INCLUDE_CONVERSATION_CACHE=true

# ── Email Notification ────────────────────────────────────────────────
NOTIFY_EMAIL="you@gmail.com"                      # ← your email address
GMAIL_KEYCHAIN_SERVICE="claude-backup-gmail"
GMAIL_KEYCHAIN_ACCOUNT="you@gmail.com"            # ← your email address

# ── Git Settings ──────────────────────────────────────────────────────
GIT_REMOTE="origin"
GIT_BRANCH="main"
MAX_FILE_SIZE_MB=90
